# ============================================================
#  ODPlatform 运行配置模板
#  生成时间: 2026-05-26 16:10:39
#  任务类型: train
#  说明: 编辑此文件后通过 `odp-config validate` 验证
# ============================================================


# ============================================================
#  train_优化器
# ============================================================
# 初始学习率
# 示例: 0.01, 0.001, 0.0001
# 建议: LR Finder 建议值附近微调
# 建议: 过大导致不收敛，过小收敛慢
# 范围: 最小值: 1e-06, 最大值: 1.0
lr0: 0.01
# 最终学习率 = lr0 * lrf
# 示例: 0.01, 0.1, 0.001
# 建议: 余弦退火策略的终点比例
# 范围: 最小值: 0.0, 最大值: 1.0
lrf: 0.01
# SGD 动量 / Adam beta1
# 示例: 0.9, 0.937, 0.95
# 范围: 最小值: 0.0, 最大值: 1.0
momentum: 0.937
# 权重衰减（L2 正则化）
# 示例: 0.0, 0.0005, 0.001
# 范围: 最小值: 0.0, 最大值: 1.0
weight_decay: 0.0005

# ============================================================
#  train_数据
# ============================================================
# 使用数据集的百分比（用于快速实验）
# 示例: 1.0, 0.5, 0.1
# 建议: 快速调试时设为 0.1，正式训练设为 1.0
# 范围: 最小值: 0.01, 最大值: 1.0
fraction: 1.0

# ============================================================
#  train_数据增强
# ============================================================
# 输入图像尺寸（像素，正方形）
# 示例: 416, 512, 640, 1280
# 建议: YOLO11n 默认 640
# 建议: 大图增加显存占用但提升小目标性能
# 范围: 最小值: 32, 最大值: 4096
imgsz: 640

# ============================================================
#  train_训练
# ============================================================
# 训练总轮数
# 示例: 50, 100, 300
# 建议: 检测任务一般 100-300 轮收敛
# 建议: 小数据集适当减少轮数
# 范围: 最小值: 1, 最大值: 10000
epochs: 100
# 批次大小
# 示例: 8, 16, 32, 64
# 建议: 显存不足时调小，建议 2 的幂
# 范围: 最小值: 1, 最大值: 1024
batch: 16
# 热身轮数
# 示例: 0.0, 3.0, 5.0
# 建议: 热身阶段学习率从低到高，有助于稳定初期训练
# 范围: 最小值: 0.0, 最大值: 50.0
warmup_epochs: 3.0
# 是否保存训练检查点
# 示例: true, false
save: true
# 每隔 N 轮保存一次检查点（-1 表示仅保存最后一轮）
# 示例: -1, 5, 10
# 建议: 配合 save=true 使用
# 建议: 频繁保存增加磁盘 IO
# 范围: 最小值: -1
save_period: -1
# 训练期间是否在验证集上评估
# 示例: true, false
val: true
# 早停耐心值（连续 N 轮无提升则停止）
# 示例: 0, 50, 100
# 建议: 0 表示禁用早停
# 范围: 最小值: 0
patience: 50
# 自动混合精度训练
# 示例: true, false
# 建议: 开启后可加速并减少显存，NVIDIA GPU 推荐开启
amp: true


