# ============================================================
#  val_阈值
# ============================================================
# 置信度阈值（仅验证+推理）
# 示例: 0.25, 0.5, 0.75
# 建议: 评估时一般保持默认 0.25
# 范围: 最小值: 0.0, 最大值: 1.0
conf: 0.25
# NMS 的 IoU 阈值
# 示例: 0.5, 0.7, 0.9
# 建议: 值越低去重越严格，值越高重复框越多
# 范围: 最小值: 0.0, 最大值: 1.0
iou: 0.7

# ============================================================
#  val_验证
# ============================================================
# 半精度推理（FP16）
# 示例: true, false
# 建议: 开启可加速，NVIDIA Tensor Core GPU 推荐
half: false


